---
- name: Install AWX operator
  kubernetes.core.helm:
    chart_ref: "{{ awx_managers.awx_operator.helm.chart.reference }}"
    chart_repo_url: "{{ awx_managers.awx_operator.helm.chart.repository }}"
    chart_version: "{{ awx_managers.awx_operator.helm.chart.version }}"
    create_namespace: true
    kubeconfig: "{{ awx_cluster.kubeconfig }}"
    release_name: "{{ awx_managers.awx_operator.helm.release.name }}"
    release_namespace: "{{ awx_managers.awx_operator.kubernetes.namespace }}"
    release_state: present
    timeout: 10m0s
    wait: true
