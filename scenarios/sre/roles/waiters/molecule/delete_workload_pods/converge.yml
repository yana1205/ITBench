---
- name: Run waiter tasks
  hosts:
    - environment
  tasks:
    - name: Import waiters role
      ansible.builtin.import_role:
        name: waiters
      vars:
        waiters_cluster:
          kubeconfig: "{{ cluster.kubeconfig }}"
        waiters_tasks:
          - id: delete-workload-pods
            args:
              kubernetesObject:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: test-deployment-standard
                  namespace: delete-workload-pods-test
          - id: delete-workload-pods
            args:
              kubernetesObject:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: test-deployment-pending
                  namespace: delete-workload-pods-test
          - id: delete-workload-pods
            args:
              kubernetesObject:
                apiVersion: apps/v1
                kind: StatefulSet
                metadata:
                  name: test-statefulset-standard
                  namespace: delete-workload-pods-test
          - id: delete-workload-pods
            args:
              kubernetesObject:
                apiVersion: apps/v1
                kind: StatefulSet
                metadata:
                  name: test-statefulset-pending
                  namespace: delete-workload-pods-test
