---
apiVersion: itbench.io/v1
kind: GroundTruth
metadata:
  name: scenario-26
spec:
  alerts:
    - group_id: checkout-service-1
      id: HighRequestErrorRate
      metadata:
        description: Request error rate in service checkout in namespace otel-demo is above 0
    - group_id: checkout-service-1
      id: HighRequestLatency
      metadata:
        description: Checkout service latency increases when email service fails
    - group_id: frontend-service-1
      id: HighRequestErrorRate
      metadata:
        description: Frontend errors cascade from checkout service failures
    - group_id: frontend-proxy-service-1
      id: HighRequestErrorRate
      metadata:
        description: Frontend-proxy errors cascade from checkout service failures
  aliases:
    - - email-service-1
      - email-pod-1
    - - checkout-service-1
      - checkout-pod-1
  fault:
    - category: Chaos
      condition: HTTP Chaos fault tampering POST request body to email service with corrupted JSON payload
      entity:
        group_id: tamper-body-otel-demo-emailservice-1
        kind: HttpChaos
        name: tamper-body-otel-demo-emailservice-1
      fault_mechanism: chaos
  groups:
    - filter:
        - otel-demo-email-http-chaos-post-body-tamper
      id: tamper-body-otel-demo-emailservice-1
      kind: HttpChaos
      namespace: chaos-mesh
      root_cause: true
    - filter:
        - email\b
      id: email-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - email-.*
      id: email-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - checkout\b
      id: checkout-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - checkout-.*
      id: checkout-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - frontend\b
      id: frontend-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - frontend-proxy
      id: frontend-proxy-service-1
      kind: Service
      namespace: otel-demo
  propagations:
    - condition: HTTP Chaos tampers POST request bodies with invalid JSON payload
      effect: Email service receives corrupted requests and fails to process them
      source: tamper-body-otel-demo-emailservice-1
      target: email-service-1
    - condition: Email service returns errors due to corrupted request payload
      effect: Checkout service experiences errors when sending order confirmation emails
      source: email-service-1
      target: checkout-service-1
    - condition: Email service errors cause retry logic in checkout
      effect: Checkout service experiences increased latency from email service retries
      source: email-service-1
      target: checkout-service-1
    - condition: Checkout service errors from email failures
      effect: Frontend experiences errors when calling checkout
      source: checkout-service-1
      target: frontend-service-1
    - condition: Frontend errors from checkout failures
      effect: Frontend-proxy experiences cascading errors
      source: frontend-service-1
      target: frontend-proxy-service-1
  recommendedActions:
    - solution:
        actions:
          - Delete the HTTP Chaos resource tampering email service requests
        id: remove_chaos_experiment
