---
apiVersion: itbench.io/v1
kind: GroundTruth
metadata:
  name: scenario-46
spec:
  alerts:
    - group_id: postgresql-pod-1
      id: KubePodCrashLooping
      metadata:
        description: Postgresql pods are stuck in CrashLoopBackOff state due to insufficient resources.
    - group_id: product-catalog-service-1
      id: HighRequestErrorRate
      metadata:
        description: Product catalog experiencing errors due to database unavailability
    - group_id: product-catalog-service-1
      id: NoRequestsReceived
      metadata:
        description: Product catalog unable to serve requests due to database failure
    - group_id: checkout-service-1
      id: HighRequestErrorRate
      metadata:
        description: Checkout experiencing errors due to database unavailability
    - group_id: frontend-service-1
      id: HighRequestErrorRate
      metadata:
        description: Frontend experiencing errors when calling failed backend services
    - group_id: frontend-proxy-service-1
      id: HighRequestErrorRate
      metadata:
        description: Frontend-proxy experiencing cascading errors from frontend failures
    - group_id: recommendation-service-1
      id: HighRequestErrorRate
      metadata:
        description: Recommendation experiencing errors due to database unavailability
    - group_id: product-reviews-service-1
      id: HighRequestErrorRate
      metadata:
        description: Product reviews experiencing errors due to database unavailability
    - group_id: payment-service-1
      id: NoRequestsReceived
      metadata:
        description: Payment receives no requests - checkout flow blocked
    - group_id: shipping-service-1
      id: NoRequestsReceived
      metadata:
        description: Shipping receives no requests - checkout flow blocked
    - group_id: email-service-1
      id: NoRequestsReceived
      metadata:
        description: Email receives no requests - checkout flow never completes
    - group_id: currency-service-1
      id: NoRequestsReceived
      metadata:
        description: Currency receives no requests - checkout flow blocked
    - group_id: accounting-service-1
      id: NoRequestsReceived
      metadata:
        description: Accounting receives no requests - no orders created
    - group_id: accounting-service-1
      id: NoDatabaseOperations
      metadata:
        description: Accounting performs no database operations - no orders to process
    - group_id: fraud-detection-service-1
      id: NoRequestsReceived
      metadata:
        description: Fraud detection receives no requests - checkout flow blocked
    - group_id: quote-service-1
      id: NoRequestsReceived
      metadata:
        description: Quote receives no requests - shipping blocked
  aliases:
    - - postgresql-service-1
      - postgresql-pod-1
    - - product-catalog-service-1
    - - checkout-service-1
    - - frontend-service-1
    - - frontend-proxy-service-1
    - - recommendation-service-1
    - - product-reviews-service-1
    - - payment-service-1
    - - shipping-service-1
    - - email-service-1
    - - currency-service-1
    - - accounting-service-1
    - - fraud-detection-service-1
    - - quote-service-1
  fault:
    - category: Configuration
      condition: Postgresql pods cannot stablize because they have insufficient resources to run.
      entity:
        group_id: postgresql-pod-1
        kind: Pod
        name: postgresql-pod-1
      fault_mechanism: insufficient-resources
  groups:
    - filter:
        - postgresql\b
      id: postgresql-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - postgresql-.*
      id: postgresql-pod-1
      kind: Pod
      namespace: otel-demo
      root_cause: true
    - filter:
        - product-catalog\b
      id: product-catalog-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - checkout\b
      id: checkout-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - frontend\b
      id: frontend-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - frontend-proxy\b
      id: frontend-proxy-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - recommendation\b
      id: recommendation-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - product-reviews\b
      id: product-reviews-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - payment\b
      id: payment-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - shipping\b
      id: shipping-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - email\b
      id: email-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - currency\b
      id: currency-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - accounting\b
      id: accounting-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - fraud-detection\b
      id: fraud-detection-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - quote\b
      id: quote-service-1
      kind: Service
      namespace: otel-demo
  propagations:
    - condition: PostgreSQL database unavailable due to pod crashes
      effect: Product catalog cannot query database, experiences errors
      source: postgresql-pod-1
      target: product-catalog-service-1
    - condition: PostgreSQL database unavailable due to pod crashes
      effect: Checkout cannot access database, experiences errors
      source: postgresql-pod-1
      target: checkout-service-1
    - condition: PostgreSQL database unavailable due to pod crashes
      effect: Recommendation cannot query database, experiences errors
      source: postgresql-pod-1
      target: recommendation-service-1
    - condition: PostgreSQL database unavailable due to pod crashes
      effect: Product reviews cannot access database, experiences errors
      source: postgresql-pod-1
      target: product-reviews-service-1
    - condition: Product catalog failing due to database unavailability
      effect: Product catalog unable to serve any requests
      source: product-catalog-service-1
      target: product-catalog-service-1
    - condition: Backend services (product catalog, recommendation, etc.) failing
      effect: Frontend experiences errors when calling backend services
      source: product-catalog-service-1
      target: frontend-service-1
    - condition: Frontend experiencing errors from backend failures
      effect: Frontend-proxy experiences cascading errors
      source: frontend-service-1
      target: frontend-proxy-service-1
    - condition: Checkout failing due to database unavailability
      effect: Payment service receives no checkout requests
      source: checkout-service-1
      target: payment-service-1
    - condition: Checkout failing due to database unavailability
      effect: Shipping service receives no checkout requests
      source: checkout-service-1
      target: shipping-service-1
    - condition: Checkout failing due to database unavailability
      effect: Currency service receives no conversion requests
      source: checkout-service-1
      target: currency-service-1
    - condition: Checkout failing due to database unavailability
      effect: Email service receives no order confirmation requests
      source: checkout-service-1
      target: email-service-1
    - condition: No orders created due to checkout failure
      effect: Accounting service receives no order events
      source: checkout-service-1
      target: accounting-service-1
    - condition: No orders created due to checkout failure
      effect: Fraud detection receives no order events
      source: checkout-service-1
      target: fraud-detection-service-1
    - condition: Shipping service receives no requests
      effect: Quote service receives no shipping quote requests
      source: shipping-service-1
      target: quote-service-1
    - condition: Accounting service receives no order events
      effect: Accounting performs no database operations
      source: checkout-service-1
      target: accounting-service-1
  recommendedActions:
    - solution:
        actions:
          - no changes is needed in application
          - update opencost alert to prevent false alerts
        id: no_action
