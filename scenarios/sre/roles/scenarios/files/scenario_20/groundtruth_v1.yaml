---
apiVersion: itbench.io/v1
kind: GroundTruth
metadata:
  name: scenario-20
spec:
  alerts:
    - group_id: frontend-proxy-service-1
      id: HighRequestErrorRate
      metadata:
        description: Frontend-proxy service error rate above threshold propagated from frontend
    - group_id: frontend-service-1
      id: HighRequestErrorRate
      metadata:
        description: Frontend service error rate above threshold due to product-catalog unavailability
    - group_id: recommendation-service-1
      id: HighRequestErrorRate
      metadata:
        description: Recommendation service error rate above threshold due to product-catalog unavailability
    - group_id: checkout-service-1
      id: HighRequestErrorRate
      metadata:
        description: Checkout service error rate above threshold propagated from frontend
    - group_id: productcatalog-pod-1
      id: KubePodNotReady
      metadata:
        description: Product catalog pod not ready due to ImagePullBackOff
    - group_id: productcatalog-pod-1
      id: KubeContainerWaiting
      metadata:
        description: Product catalog container waiting due to image pull failure
    - group_id: product-catalog-service-1
      id: NoRequestsReceived
      metadata:
        description: Product catalog receives no requests - service has no healthy endpoints
    - group_id: payment-service-1
      id: NoRequestsReceived
      metadata:
        description: Payment receives no requests - checkout flow blocked by product-catalog failure
    - group_id: shipping-service-1
      id: NoRequestsReceived
      metadata:
        description: Shipping receives no requests - checkout flow blocked by product-catalog failure
    - group_id: email-service-1
      id: NoRequestsReceived
      metadata:
        description: Email receives no requests - checkout flow blocked by product-catalog failure
    - group_id: currency-service-1
      id: NoRequestsReceived
      metadata:
        description: Currency receives no requests - checkout flow blocked by product-catalog failure
    - group_id: fraud-detection-service-1
      id: NoRequestsReceived
      metadata:
        description: Fraud detection receives no requests - no orders created due to checkout failures
    - group_id: quote-service-1
      id: NoRequestsReceived
      metadata:
        description: Quote receives no requests - shipping blocked by checkout failures
    - group_id: accounting-service-1
      id: NoRequestsReceived
      metadata:
        description: Accounting receives no requests - no orders created due to checkout failures
    - group_id: accounting-service-1
      id: NoDatabaseOperations
      metadata:
        description: Accounting performs no database operations - no orders to process
  aliases:
    - - productcatalog-pod-1
      - productcatalog-deployment-1
  fault:
    - category: Change
      condition: Invalid image specified in deployment
      entity:
        group_id: productcatalog-deployment-1
        kind: Deployment
        name: product-catalog
      fault_mechanism: modify-kubernetes-workload-container-image
  groups:
    - filter:
        - product-catalog-.*
      id: productcatalog-deployment-1
      kind: Deployment
      namespace: otel-demo
      root_cause: true
    - filter:
        - product-catalog-.*
      id: productcatalog-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - frontend-proxy\b
      id: frontend-proxy-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - frontend\b
      id: frontend-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - checkout\b
      id: checkout-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - recommendation\b
      id: recommendation-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - product-catalog\b
      id: product-catalog-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - payment\b
      id: payment-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - shipping\b
      id: shipping-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - email\b
      id: email-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - currency\b
      id: currency-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - fraud-detection\b
      id: fraud-detection-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - quote\b
      id: quote-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - accounting\b
      id: accounting-service-1
      kind: Service
      namespace: otel-demo
  propagations:
    - condition: product-catalog deployment updated to point to an invalid image
      effect: product-catalog pod enters ImagePullBackOff state
      source: productcatalog-deployment-1
      target: productcatalog-pod-1
    - condition: product-catalog service has zero healthy endpoints after forced restart
      effect: frontend service experiences request errors when calling product-catalog
      source: productcatalog-pod-1
      target: frontend-service-1
    - condition: product-catalog service has zero healthy endpoints after forced restart
      effect: recommendation service experiences request errors when calling product-catalog
      source: productcatalog-pod-1
      target: recommendation-service-1
    - condition: product-catalog service has zero healthy endpoints
      effect: product-catalog service receives no requests - all connections refused
      source: productcatalog-pod-1
      target: product-catalog-service-1
    - condition: Frontend service experiences errors from product-catalog failures
      effect: Frontend-proxy experiences cascading errors
      source: frontend-service-1
      target: frontend-proxy-service-1
    - condition: Checkout fails due to product-catalog unavailability
      effect: Payment service receives no requests from checkout
      source: checkout-service-1
      target: payment-service-1
    - condition: Checkout fails due to product-catalog unavailability
      effect: Shipping service receives no requests from checkout
      source: checkout-service-1
      target: shipping-service-1
    - condition: Checkout fails due to product-catalog unavailability
      effect: Email service receives no order confirmation requests
      source: checkout-service-1
      target: email-service-1
    - condition: Checkout fails due to product-catalog unavailability
      effect: Currency service receives no conversion requests
      source: checkout-service-1
      target: currency-service-1
    - condition: No orders created due to checkout failure
      effect: Fraud detection receives no order events
      source: checkout-service-1
      target: fraud-detection-service-1
    - condition: Shipping receives no requests
      effect: Quote service receives no shipping quote requests
      source: shipping-service-1
      target: quote-service-1
    - condition: No orders created due to checkout failure
      effect: Accounting service receives no order events
      source: checkout-service-1
      target: accounting-service-1
    - condition: Accounting receives no order events
      effect: Accounting performs no database operations
      source: checkout-service-1
      target: accounting-service-1
  recommended_actions:
    - solution:
        actions:
          - change the image field in productcatalogueservice deployment pointing to the correct image
        id: change_the_image_field_in_productcatalogueservice_deployment_pointing_to_the_correct_image
