---
apiVersion: itbench.io/v1
kind: GroundTruth
metadata:
  name: scenario-31
spec:
  alerts:
    - group_id: frontend-proxy-service-1
      id: HighRequestErrorRate
      metadata:
        description: Frontend proxy experiencing connection errors to frontend
    - group_id: frontend-proxy-service-1
      id: HighRequestLatency
      metadata:
        description: Frontend proxy experiencing high latency when attempting to connect to blocked frontend
    - group_id: frontend-service-1
      id: NoRequestsReceived
      metadata:
        description: Frontend receives no requests - NetworkPolicy blocking ingress
    - group_id: frontend-service-1
      id: HighRequestErrorRate
      metadata:
        description: Frontend service experiencing errors from failed connection attempts due to NetworkPolicy
    - group_id: ad-service-1
      id: NoRequestsReceived
      metadata:
        description: Ad service receives no requests - frontend blocked
    - group_id: checkout-service-1
      id: NoRequestsReceived
      metadata:
        description: Checkout service receives no requests - frontend blocked
    - group_id: currency-service-1
      id: NoRequestsReceived
      metadata:
        description: Currency service receives no requests - frontend blocked
    - group_id: product-catalog-service-1
      id: NoRequestsReceived
      metadata:
        description: Product catalog receives no requests - frontend blocked
    - group_id: recommendation-service-1
      id: NoRequestsReceived
      metadata:
        description: Recommendation service receives no requests - frontend blocked
    - group_id: product-reviews-service-1
      id: NoRequestsReceived
      metadata:
        description: Product reviews receives no requests - frontend blocked
    - group_id: shipping-service-1
      id: NoRequestsReceived
      metadata:
        description: Shipping service receives no requests - frontend blocked
    - group_id: payment-service-1
      id: NoRequestsReceived
      metadata:
        description: Payment service receives no requests - checkout flow blocked
    - group_id: email-service-1
      id: NoRequestsReceived
      metadata:
        description: Email service receives no requests - checkout flow blocked
    - group_id: fraud-detection-service-1
      id: NoRequestsReceived
      metadata:
        description: Fraud detection receives no requests - checkout flow blocked
    - group_id: accounting-service-1
      id: NoRequestsReceived
      metadata:
        description: Accounting service receives no requests - order processing blocked
    - group_id: quote-service-1
      id: NoRequestsReceived
      metadata:
        description: Quote service receives no requests - shipping blocked
    - group_id: accounting-service-1
      id: NoDatabaseOperations
      metadata:
        description: Accounting service performing no database operations - no orders to process
  aliases:
    - - frontend-service-1
      - frontend-pod-1
    - - frontend-proxy-service-1
      - frontend-proxy-pod-1
    - - ad-service-1
      - ad-pod-1
    - - checkout-service-1
      - checkout-pod-1
    - - currency-service-1
      - currency-pod-1
    - - product-catalog-service-1
      - product-catalog-pod-1
    - - recommendation-service-1
      - recommendation-pod-1
    - - product-reviews-service-1
      - product-reviews-pod-1
    - - shipping-service-1
      - shipping-pod-1
    - - payment-service-1
      - payment-pod-1
    - - email-service-1
      - email-pod-1
    - - fraud-detection-service-1
      - fraud-detection-pod-1
    - - accounting-service-1
      - accounting-pod-1
    - - quote-service-1
      - quote-pod-1
  fault:
    - category: Configuration
      condition: NetworkPolicy blocks all ingress traffic to frontend pods
      entity:
        group_id: frontend-pod-1
        kind: Pod
        name: frontend-pod-1
      fault_mechanism: misconfigured-network-policy
  groups:
    - filter:
        - frontend-block-all-ports
      id: frontend-block-all-ports
      kind: NetworkPolicy
      namespace: otel-demo
      root_cause: true
    - filter:
        - frontend-.*
      id: frontend-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - frontend\b
      id: frontend-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - frontend-proxy-.*
      id: frontend-proxy-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - frontend-proxy\b
      id: frontend-proxy-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - ad-.*
      id: ad-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - ad\b
      id: ad-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - checkout-.*
      id: checkout-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - checkout\b
      id: checkout-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - currency-.*
      id: currency-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - currency\b
      id: currency-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - product-catalog-.*
      id: product-catalog-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - product-catalog\b
      id: product-catalog-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - recommendation-.*
      id: recommendation-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - recommendation\b
      id: recommendation-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - product-reviews-.*
      id: product-reviews-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - product-reviews\b
      id: product-reviews-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - shipping-.*
      id: shipping-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - shipping\b
      id: shipping-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - payment-.*
      id: payment-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - payment\b
      id: payment-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - email-.*
      id: email-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - email\b
      id: email-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - fraud-detection-.*
      id: fraud-detection-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - fraud-detection\b
      id: fraud-detection-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - accounting-.*
      id: accounting-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - accounting\b
      id: accounting-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - quote-.*
      id: quote-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - quote\b
      id: quote-service-1
      kind: Service
      namespace: otel-demo
  propagations:
    - condition: Misconfigured network policy
      effect: NetworkPolicy blocks all ingress traffic to frontend pods
      source: frontend-block-all-ports
      target: frontend-pod-1
    - condition: NetworkPolicy blocks all ingress traffic to frontend pods
      effect: Frontend service cannot receive traffic, making it completely unavailable
      source: frontend-pod-1
      target: frontend-service-1
    - condition: Frontend proxy cannot connect to frontend service due to network policy
      effect: All user requests through proxy fail with connection errors
      source: frontend-service-1
      target: frontend-proxy-service-1
    - condition: Frontend proxy experiencing connection failures to frontend
      effect: Frontend proxy experiences high latency from repeated connection attempts and timeouts
      source: frontend-service-1
      target: frontend-proxy-service-1
    - condition: NetworkPolicy blocking ingress causes failed connection attempts
      effect: Frontend service logs errors from rejected connections
      source: frontend-pod-1
      target: frontend-service-1
    - condition: Frontend service completely unavailable
      effect: Ad service receives no requests from frontend
      source: frontend-service-1
      target: ad-service-1
    - condition: Frontend service completely unavailable
      effect: Checkout service receives no requests from frontend
      source: frontend-service-1
      target: checkout-service-1
    - condition: Frontend service completely unavailable
      effect: Currency service receives no requests from frontend
      source: frontend-service-1
      target: currency-service-1
    - condition: Frontend service completely unavailable
      effect: Product catalog receives no requests from frontend
      source: frontend-service-1
      target: product-catalog-service-1
    - condition: Frontend service completely unavailable
      effect: Recommendation service receives no requests from frontend
      source: frontend-service-1
      target: recommendation-service-1
    - condition: Frontend service completely unavailable
      effect: Product reviews receives no requests from frontend
      source: frontend-service-1
      target: product-reviews-service-1
    - condition: Frontend service completely unavailable
      effect: Shipping service receives no requests from frontend
      source: frontend-service-1
      target: shipping-service-1
    - condition: Checkout flow never initiated due to frontend unavailability
      effect: Payment service receives no requests
      source: checkout-service-1
      target: payment-service-1
    - condition: Checkout flow never initiated due to frontend unavailability
      effect: Email service receives no requests
      source: checkout-service-1
      target: email-service-1
    - condition: Checkout flow never initiated due to frontend unavailability
      effect: Fraud detection receives no requests
      source: checkout-service-1
      target: fraud-detection-service-1
    - condition: Checkout flow never initiated due to frontend unavailability
      effect: Accounting service receives no order processing requests
      source: checkout-service-1
      target: accounting-service-1
    - condition: Shipping service receives no requests from frontend
      effect: Quote service receives no requests
      source: shipping-service-1
      target: quote-service-1
    - condition: Checkout flow never initiated due to frontend unavailability
      effect: Accounting service performs no database operations as no orders are created
      source: checkout-service-1
      target: accounting-service-1
  recommended_actions:
    - solution:
        actions:
          - Identify and remove the NetworkPolicy blocking ingress to frontend pods
        id: remove_blocking_network_policy
