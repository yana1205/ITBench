---
apiVersion: itbench.io/v2
kind: Scenario
metadata:
  name: scenario-57
spec:
  applications:
    opentelemetryDemo:
      enabled: true
  faults:
    - injections:
        - args:
            container:
              name: checkout
            kubernetesObject:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: checkout
                namespace: otel-demo
          id: unsupported-architecture-kubernetes-workload-container-image
      waitFor:
        postInjection:
          - args:
              kubernetesObject:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: checkout
                  namespace: otel-demo
            id: delete-workload-pods
  tools:
    sre:
      enabled: true
