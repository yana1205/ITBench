---
- name: Retrieve workload
  kubernetes.core.k8s_info:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    api_version: "{{ injection_task.args.kubernetesObject.apiVersion }}"
    kind: "{{ injection_task.args.kubernetesObject.kind }}"
    name: "{{ injection_task.args.kubernetesObject.metadata.name }}"
    namespace: "{{ injection_task.args.kubernetesObject.metadata.namespace }}"
  register: faults_workload

- name: Validate that workload exists
  ansible.builtin.assert:
    that:
      - faults_workload.api_found
      - faults_workload.resources | ansible.builtin.length == 1
    fail_msg: Unable to find workload. Please verify that the workload exists.
    success_msg: Found workload.

- name: Create ConfigMap
  kubernetes.core.k8s:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ faults_workload.resources[0].metadata.name }}-config"
        namespace: "{{ faults_workload.resources[0].metadata.namespace }}"
      data:
        config: "{{ lookup('ansible.builtin.file', 'files/scripts/crashing_kubernetes_workload_init_container/invalid_config.json') }}"
        script: "{{ lookup('ansible.builtin.file', 'files/scripts/crashing_kubernetes_workload_init_container/load_config.py') }}"
    state: present

- name: Update workload init containers
  kubernetes.core.k8s:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: "{{ faults_workload.resources[0].apiVersion }}"
      kind: "{{ faults_workload.resources[0].kind }}"
      metadata:
        name: "{{ faults_workload.resources[0].metadata.name }}"
        namespace: "{{ faults_workload.resources[0].metadata.namespace }}"
      spec:
        template:
          spec:
            initContainers:
              - name: worker
                image: registry.access.redhat.com/ubi10/python-312-minimal:10.1-1774255563
                command:
                  - /bin/sh
                args:
                  - -c
                  - "python3.12 ~/scripts/load_config.py"
                volumeMounts:
                  - name: config
                    mountPath: /opt/app-root/src/config
                    readOnly: true
                  - name: scripts
                    mountPath: /opt/app-root/src/scripts
                    readOnly: true
            volumes:
              - name: config
                configMap:
                  name: "{{ faults_workload.resources[0].metadata.name }}-config"
                  defaultMode: 0755
                  items:
                    - key: config
                      path: config.json
              - name: scripts
                configMap:
                  name: "{{ faults_workload.resources[0].metadata.name }}-config"
                  defaultMode: 0755
                  items:
                    - key: script
                      path: load_config.py
    state: patched
