---
- name: Manage SRE and FinOps Incident Environment Sample Application Stack
  hosts:
    - environment
  pre_tasks:
    - name: Import system role
      ansible.builtin.import_role:
        name: system
      tags:
        - always
      vars:
        system_cluster:
          kubeconfig: "{{ cluster.kubeconfig }}"

    - name: Import cluster role
      ansible.builtin.import_role:
        name: cluster
      tags:
        - always
      vars:
        cluster_files:
          kubeconfig: "{{ cluster.kubeconfig }}"
  tasks:
    - name: Import role variables from scenario
      tags:
        - install_applications
      when:
        - scenario_id is defined
      block:
        - name: Import scenarios role
          ansible.builtin.import_role:
            name: scenarios
          vars:
            scenarios_identifier: "{{ scenario_id }}"

        - name: Create application installation variable
          ansible.builtin.set_fact:
            applications_configuration: "{{ scenarios_scenario.spec.applications }}"

    - name: Create role variables
      tags:
        - install_applications
      when:
        - scenario_id is undefined
      block:
        - name: Create application installation variable
          ansible.builtin.set_fact:
            applications_configuration:
              bookInfo:
                enabled: "{{ applications.book_info | ansible.builtin.default(false) }}"
              opentelemetryDemo:
                enabled: "{{ applications.otel_demo | ansible.builtin.default(false) }}"

    - name: Import applications role
      ansible.builtin.import_role:
        name: applications
      vars:
        applications_cluster:
          kubeconfig: "{{ cluster.kubeconfig }}"
          platform: "{{ cluster_platform }}"
